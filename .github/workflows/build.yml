name: Buildtest

on:
  pull_request:
  push:

jobs:
  build-single-linux-runner:
    name: Build Linux, Windows and macOS
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            autoconf-archive \
            automake \
            bison \
            build-essential \
            ca-certificates \
            clang \
            cmake \
            curl \
            file \
            flex \
            git \
            help2man \
            libtool \
            libcmocka-dev \
            libusb-1.0-0-dev \
            libxml2-dev \
            libzip-dev \
            lld \
            mingw-w64 \
            ninja-build \
            patchelf \
            pipx \
            pkg-config \
            python3-pip \
            tar \
            unzip \
            zip

          pipx ensurepath
          pipx install meson==1.4.0
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Cache cross dependencies
        uses: actions/cache@v4
        with:
          path: |
            build/ci-vcpkg-windows
            build/ci-vcpkg-macos
            ~/.cache/vcpkg
          key: qdl-cross-vcpkg-${{ runner.os }}-${{ hashFiles('scripts/ci-build-*.sh') }}
          restore-keys: |
            qdl-cross-vcpkg-${{ runner.os }}-

      - name: Build all targets concurrently
        run: scripts/ci-build-all.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qdl-cross-platform-binaries
          path: dist/**
